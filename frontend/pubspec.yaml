name: frontend
description: "A flutter frontend for StudEase chatbot application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  video_player: ^2.11.1
  flutter_svg: ^2.2.4
  http: ^1.2.2
  shared_preferences: ^2.5.4
  flutter_markdown_plus: ^1.0.0
  url_launcher: ^6.2.5


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/